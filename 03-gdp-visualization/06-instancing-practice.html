<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <title>GDP 柱状图 - Instancing 注释版</title>
</head>
<body>
    <div id="cesiumcontainer"></div>
    <script type="module">

        // ============================================================
        // ① API Key 读取
        // fetch('apikey.txt') 读本地文件，用 .trim() 去掉换行空格
        // 必须用 http-server 启动，file:// 不支持 fetch
        // ============================================================
        const res = await fetch('apikey.txt');
        Cesium.Ion.defaultAccessToken = (await res.text()).trim();

        // ============================================================
        // ② 创建 Viewer（3D 地球）
        // Viewer 里关掉不需要的 UI 控件，减少渲染负担
        // 不加 terrain 选项 = 无地形，加载快且拖拽流畅
        // ============================================================
        const viewer = new Cesium.Viewer('cesiumcontainer', {
            skyAtmosphere: false,      // 关大气效果（省 GPU）
            sceneModePicker: false,    // 关 2D/3D 切换按钮
            baseLayerPicker: false,    // 关底图选择器
        })

        // ============================================================
        // ③ 飞到中国上空
        // fromDegrees(经度, 纬度, 高度)
        // 110, 35 ≈ 中国中心；8000000 = 800万米 ≈ 能看到整个中国
        // ============================================================
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(110, 35, 8000000),
        });

        // ============================================================
        // ④ 关掉不需要的渲染特效
        // 光照/雾/抗锯齿 对数据展示没帮助，但吃 GPU
        // ============================================================
        viewer.scene.globe.enableLighting = false;  // 关光照（省很多）
        viewer.scene.fog.enabled = false;            // 关雾
        viewer.scene.fxaa = false;                   // 关抗锯齿

        // ============================================================
        // ⑤ 读取 GDP 数据
        // china-gdp.json 里是 34 个城市的 {name, lon, lat, gdp}
        // ============================================================
        const gdpResponse = await fetch('china-gdp.json')
        const gdp = await gdpResponse.json()

        // ============================================================
        // ⑥ 造柱子 — Primitive Instancing 核心
        //
        // 用 .map() 而不是 .forEach()
        // .map() 会收集每次 return 的结果，组成新数组
        // .forEach() 只做事，不返回东西
        //
        // 每个城市 → 一张 GeometryInstance（工单）
        // 工单 = BoxGeometry（形状） + modelMatrix（位置）
        // ============================================================
        const instances = gdp.map(cities => {

            // ---------- ⑥-a 数据映射 ----------
            // GDP × 20 = 柱子高度（米）
            // 北京 GDP=49843 → h ≈ 996,860 米（约 1000 公里高）
            const h = cities.gdp * 20
            // 柱子粗细固定 80 公里（所有柱子一样粗才整齐）
            const w = 80000

            // ---------- ⑥-b 算位置 ----------
            // fromDegrees(经度, 纬度, 高度)
            // 高度 = h/2 → 柱子底部贴地，中心在半高处
            // 如果高度 = 0，柱子一半埋地里
            // 如果高度 = h，柱子浮在半空
            const center = Cesium.Cartesian3.fromDegrees(
                cities.lon,
                cities.lat,
                h / 2         // ← 关键：半高贴地
            )

            // ---------- ⑥-c 算朝向 ----------
            // eastNorthUpToFixedFrame(center)
            // 生成一个 4×4 矩阵，告诉 GPU：
            //   "这个柱子的 Y 轴 = 地球表面的'上'方向"
            //   "柱子的底部对准 center 那个点"
            // 因为地球是球形的，广州的"上"和北京的"上"方向不同
            // 没有这行，所有柱子都朝同一个方向，看起来是歪的
            const transform = Cesium.Transforms.eastNorthUpToFixedFrame(center)

            // ---------- ⑥-d 返回一张工单 ----------
            // GeometryInstance = 形状 + 位置
            return new Cesium.GeometryInstance({

                // 模具：BoxGeometry 定义柱子的形状
                geometry: new Cesium.BoxGeometry({
                    // vertexFormat：告诉 GPU 只需要"位置+法线"信息
                    // 不需要纹理坐标（柱子没贴图），省内存
                    vertexFormat: Cesium.VertexFormat.POSITION_AND_NORMAL,

                    // minimum / maximum：Box 的两个对角顶点（局部坐标）
                    // 中心在 (0,0,0)，范围从 (-w/2, -w/2, -h/2) 到 (w/2, w/2, h/2)
                    // 注意：用 new Cartesian3，不是 fromDegrees！
                    // fromDegrees 是转经纬度的，算出来是几千万米的值，完全不对
                    minimum: new Cesium.Cartesian3(-w / 2, -w / 2, -h / 2),
                    maximum: new Cesium.Cartesian3(w / 2, w / 2, h / 2),
                }),

                // modelMatrix：把 Box 从局部坐标移到地球上的位置
                modelMatrix: transform,
            })
        })
        // .map() 执行完后，instances = [工单1, 工单2, ..., 工单34]

        // ============================================================
        // ⑦ 所有柱子一次性提交 GPU
        //
        // Primitive 把 34 张工单合并成 1 个 draw call
        // Entity Box 是 34 个独立的 draw call（卡的原因）
        // ============================================================
        viewer.scene.primitives.add(new Cesium.Primitive({
            // 那叠工单——34 个 GeometryInstance
            geometryInstances: instances,

            // 外观设置：纯红色，不透明
            appearance: new Cesium.PerInstanceColorAppearance({
                closed: true,          // 封闭实体（画柱子的背面）
                translucent: false     // 不透明（不计算透明度，更快）
            })
        }))

        // ============================================================
        // ⑧ 标签 — 用 Entity（因为 Primitive 不支持文字）
        //
        // 每个城市单独加一个 label 实体
        // position 高度 = h + 1000，浮在柱子顶部
        // ============================================================
        gdp.forEach(cities => {
            const h = cities.gdp * 20
            viewer.entities.add({
                // 放在柱子顶部往上 1000 米，不会被柱子挡住
                position: Cesium.Cartesian3.fromDegrees(
                    cities.lon,
                    cities.lat,
                    h + 1000
                ),
                label: {
                    text: cities.name + '\n' + cities.gdp + '亿',  // \n 换行
                    font: '20px sans-serif',
                    color: Cesium.Color.WHITE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,  // 文字从底部往上长
                    disableDepthTestDistance: 0,    // 不被柱子挡住
                    distanceDisplayCondition:
                        new Cesium.DistanceDisplayCondition(0, 10000000),  // 远了不显示
                },
            })
        })

        // ============================================================
        // ⑨ 显示 FPS（左上角）
        // 拖拽时看数值变化，判断优化效果
        // ============================================================
        viewer.scene.debugShowFramesPerSecond = true

    </script>
</body>
</html>
