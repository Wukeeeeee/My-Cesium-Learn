<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div id="cesiumcontainer"></div>
    <script type="module">

        const res = await fetch('apikey.txt');
        Cesium.Ion.defaultAccessToken = (await res.text()).trim();

        const viewer=new Cesium.Viewer('cesiumcontainer',{
            terrain: Cesium.Terrain.fromWorldTerrain(),
        });

        viewer.camera.flyTo({
            //经纬度
            destination:Cesium.Cartesian3.fromDegrees(113.27, 23.13, 400000000),

            }
        );

        const res01=await fetch('china-gdp.json')
        const gdp=await res01.json()
        gdp.forEach(cities=>{
            viewer.entities.add({
                position:Cesium.Cartesian3.fromDegrees(cities.lon,cities.lat,cities.gdp*50),
                box:{
                    dimensions:new Cesium.Cartesian3(50000,50000,cities.gdp*100),
                    material:Cesium.Color.RED
                },
                label:{
                    
                    text:cities.capital,
                    font:'20px sans-serif',
                    color:Cesium.Color.WHITE,
                    pixelOffset:new Cesium.Cartesian2(0,0),
                    //设置标签显示的距离范围
                    displayCondition:new Cesium.DistanceDisplayCondition(0,1000000000),
                verticalOrigin:Cesium.VerticalOrigin.BOTTOM,

                },
                distanceDepthTestDistance:0,
            })

        })

    </script>
</body>
</html>
