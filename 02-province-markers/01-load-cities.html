<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div id="cesiumcontainer"></div>
    <script type="module">

        const res = await fetch('apikey.txt');
        Cesium.Ion.defaultAccessToken = (await res.text()).trim();

        const viewer=new Cesium.Viewer('cesiumcontainer',{
            terrain: Cesium.Terrain.fromWorldTerrain(),
        });

        //设置相机飞到的位置

        // viewer.camera.flyTo({
        //     //经纬度
        //     destination:Cesium.Cartesian3.fromDegrees(113.27, 23.13, 40000),
        //     orientation:{
        //         //设置相机飞到的角度
        //         heading: Cesium.Math.toRadians(0.0),
        //         //设置相机飞到的俯仰角度
        //         pitch: Cesium.Math.toRadians(-30.0),
        //     }
        // });

        const entity=viewer.entities.add({
            position:Cesium.Cartesian3.fromDegrees(113.27, 23.13, 400),
            point:{
                pixelSize:10,
                color:Cesium.Color.RED,
            },
            label:{
                text:"广州",
                font:'40px sans-serif',
                color:Cesium.Color.WHITE,
            }

        })

    </script>
</body>
</html>
