<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Include the CesiumJS JavaScript and CSS files -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="module">
    const res = await fetch('apikey.txt');
    Cesium.Ion.defaultAccessToken = (await res.text()).trim();

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      //bug
      baseLayerPicker: false,
    });


    // 把 ds 定义在外面，这样下面遍历能用
    let ds;

    try {
        const chinaProvince = await fetch('china-province.geojson');
        const chinaProvinceJson = await chinaProvince.json();

    delete chinaProvinceJson.crs;

    ds=await Cesium.GeoJsonDataSource.load(chinaProvinceJson,{
        stroke: Cesium.Color.YELLOW,
        strokeWidth:20,
        fill: Cesium.Color.WHITE.withAlpha(0.01),
        //椭球面上绘制
        clampToGround: false,
    });

    viewer.dataSources.add(ds);



    const southsea = await fetch('southsea.geojson');
    const southseaJson = await southsea.json();

    delete southseaJson.crs;

    const ss =await Cesium.GeoJsonDataSource.load(southseaJson,{
        stroke:Cesium.Color.RED,
        strokeWidth:5,
    });
    viewer.dataSources.add(ss);
    } catch (error) {
        console.error('加载中国省份数据失败:', error);
    }

    //创建监听器
    // const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

    //监听点击事件
    viewer.screenSpaceEventHandler.setInputAction((movement)=> {

        const position=movement.position;
        //点击位置的屏幕坐标
        console.log(position);
        //点击位置的笛卡尔坐标
        const positionCartesian=viewer.camera.pickEllipsoid(position);
        console.log(positionCartesian);
        if (!positionCartesian) {
            console.log('点击位置不在椭球面上');
            return;
        }
        //转弧度制经纬度坐标
        const carto=Cesium.Cartographic.fromCartesian(positionCartesian);
        console.log(carto);
        //转标准经纬度坐标
        const longitudeDegrees=Cesium.Math.toDegrees(carto.longitude);
        const latitudeDegrees=Cesium.Math.toDegrees(carto.latitude);


        // 遍历 ds 里的省份，判断点击位置在哪个省份
        if (ds) {

            for (const entity of ds.entities.values) {
                // 只检查有多边形的省份
                if (!entity.polygon) continue;
                // 提取多边形的顶点
                // 多边形的顶点是 Cartesian3 类型，需要转换为 [经度, 纬度] 数组
                const positions = entity.polygon.hierarchy.getValue().positions;
                // 转换为 [经度, 纬度] 数组
                const lonLatArray = positionsToLonLat(positions);


                // 检查点击位置是否在多边形内部并输出省份名称
                if (IspointinPolygon(longitudeDegrees, latitudeDegrees, lonLatArray)) {
                    const name = entity.properties.name?.getValue() || entity.name;
                    console.log(name, '点击位置在省份内部');
                }
            }
        } else {
            console.log('ds 未加载');
        }

        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        //检验内部函数
        function IspointinPolygon(lon,lat,polygon){
            let inside=false;

            //遍历全部的线段0-1 1-2 2-3 3-0
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i][0], yi = polygon[i][1];
                const xj = polygon[j][0], yj = polygon[j][1];

                //将两点都在射线上方和下方的线段排除
                const latcross = (yi > lat) !== (yj > lat);

                if (latcross) {
                    //实际上的射线就是y=lat
                    //计算交点的x坐标
                    const crossX = (xj - xi) * (lat - yi) / (yj - yi) + xi;
                    //判断交点是否在点击位置的右侧
                    //如果交点在点击位置的右侧，说明点击位置在多边形内部
                    if (crossX > lon) {
                        inside = !inside;
                    }
                }
            }
            return inside;
        }

        // Cartesian3 转 [经度, 纬度] 数组
        function positionsToLonLat(positions) {
            return positions.map(pos => {
                const carto = Cesium.Cartographic.fromCartesian(pos);
                return [Cesium.Math.toDegrees(carto.longitude), Cesium.Math.toDegrees(carto.latitude)];
            });
        }

    viewer.scene.globe.enableLighting=true;
    viewer.scene.sun=new Cesium.Sun();

    viewer.scene.debugShowFramesPerSecond = true;
  </script>
</body>
</html>
