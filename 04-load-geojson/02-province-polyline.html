<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #cesiumContainer { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="module">
    const res = await fetch('apikey.txt');
    Cesium.Ion.defaultAccessToken = (await res.text()).trim();

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      baseLayerPicker: false,
    });

    const chinaProvince = await fetch('china-province.geojson');
    const data = await chinaProvince.json();
    delete data.crs;

    // 遍历每个省
    data.features.forEach(feature => {
      const geom = feature.geometry;
      let polygons = [];

      if (geom.type === 'Polygon') {
        polygons = [geom.coordinates];
      } else if (geom.type === 'MultiPolygon') {
        polygons = geom.coordinates;
      }

      polygons.forEach(polygon => {
        // polygon[0] = 外环（省界的轮廓）
        const outerRing = polygon[0];
        const positions = outerRing.map(coord =>
          Cesium.Cartesian3.fromDegrees(coord[0], coord[1])
        );

        viewer.entities.add({
          polyline: {
            positions: positions,
            width: 3,
            material: Cesium.Color.YELLOW,
            clampToGround: false,
          }
        });
      });
    });

    // 南海
    const southsea = await fetch('southsea.geojson');
    const southseaData = await southsea.json();
    delete southseaData.crs;
    const ss = await Cesium.GeoJsonDataSource.load(southseaData, {
      stroke: Cesium.Color.RED,
      strokeWidth: 3,
    });
    viewer.dataSources.add(ss);

    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(110, 35, 5000000),
      duration: 2
    });

    viewer.scene.debugShowFramesPerSecond = true;
  </script>
</body>
</html>
