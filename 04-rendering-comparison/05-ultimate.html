<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <title>05 — 终极优化 requestRenderMode</title>
    <style>
        .cesium-viewer-bottom, .cesium-animation-rect, .cesium-timeline-main {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="cesiumcontainer"></div>
    <script type="module">

        const res = await fetch('apikey.txt');
        Cesium.Ion.defaultAccessToken = (await res.text()).trim();

        const viewer = new Cesium.Viewer('cesiumcontainer', {
            terrain: undefined,
            skyAtmosphere: false,
            skyBox: false,
            sceneModePicker: false,
            baseLayerPicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            infoBox: false,
            selectionIndicator: false,
        });

        viewer.scene.globe.enableLighting = false;
        viewer.scene.globe.showGroundAtmosphere = false;
        viewer.scene.globe.showWaterEffect = false;
        viewer.scene.fog.enabled = false;
        viewer.scene.fxaa = false;
        viewer.scene.highDynamicRange = false;

        // ===== 真正的优化核心：不动时不渲染 =====
        viewer.scene.requestRenderMode = true;
        viewer.scene.maximumRenderTimeChange = Infinity;

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(110, 35, 8000000),
        });

        const res01 = await fetch('china-gdp.json')
        const gdp = await res01.json()

        // Billboard（最轻量）
        gdp.forEach(cities => {
            const h = cities.gdp * 20
            const canvas = document.createElement('canvas')
            canvas.width = 64
            canvas.height = Math.max(h / 5000, 10)
            const ctx = canvas.getContext('2d')
            ctx.fillStyle = '#ff4444'
            ctx.fillRect(0, 0, 64, canvas.height)
            ctx.strokeStyle = '#cc0000'
            ctx.lineWidth = 2
            ctx.strokeRect(0, 0, 64, canvas.height)

            viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(cities.lon, cities.lat, h / 2),
                billboard: {
                    image: canvas,
                    scale: 1,
                    verticalOrigin: Cesium.VerticalOrigin.CENTER,
                },
                label: {
                    text: cities.name + '\n' + cities.gdp + '亿',
                    font: '20px sans-serif',
                    color: Cesium.Color.WHITE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    disableDepthTestDistance: 0,
                    distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 10000000),
                },
            })
        })

        viewer.scene.debugShowFramesPerSecond = true;

    </script>
</body>
</html>
